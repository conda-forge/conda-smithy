name: conda-smithy
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python>=3.11
  # Development dependencies
  - pip
  - python-build
  - setuptools>=80
  - setuptools_scm>=8.1
  - pre-commit
  - mock
  - pytest
  - pytest-cov
  # # Part of some optional lint tests
  - conda-recipe-manager>=0.9
  - conda-souschef
  # Runtime dependencies
  - conda>=22.11.1
  - conda-build>=26.3.0
  - conda-package-handling>=1.9.0
  - jinja2
  - requests
  - pycryptodome
  - referencing
  - pygit2
  - pygithub>=2,<3
  - ruamel.yaml
  - conda-forge-pinning
  - vsts-python-api
  - toolz
  - shellcheck
  - scrypt
  - license-expression
  - libarchive
  - cirun>=0.30
  - pydantic>=2.11,<3
  - pixi>=0.59.0
  - jsonschema
  - exceptiongroup
  # py-rattler's APIs are subject to change, pin to minor versions
  - py-rattler>=0.22,<0.23
  - rattler-build-conda-compat>=1.4.15,<2.0.0a0
