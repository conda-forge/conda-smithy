name: tests

on:
  push:
    branches:
      - main
  pull_request: null

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash -el {0}

jobs:
  tests:
    name: tests
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Conda env
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476
        with:
          environment-file: environment.yml
          micromamba-version: 1.5.12-0
          cache-environment: true
          create-args: >-
            coverage
            coveralls

      - name: install conda-smithy
        run: |
          conda uninstall --force --yes conda-smithy
          python -m pip install -v --no-build-isolation -e .
          git config --global user.email "smithy@smithy.smithy"
          git config --global user.name "smithy"

      - name: test versions
        run: |
          pip uninstall conda-smithy --yes
          [[ $(python -m setuptools_scm) != "0.0.0" ]] || exit 1

          rm -rf dist/*
          python -m build --sdist
          pip install --no-build-isolation dist/*.tar.gz
          pushd ..
          python -c "import conda_smithy; assert conda_smithy.__version__ != '0.0.0'"
          popd
          pip uninstall conda-smithy --yes

          rm -rf dist/*
          python -m build --sdist . --outdir dist
          pip install --no-build-isolation dist/*.tar.gz
          pushd ..
          python -c "import conda_smithy; assert conda_smithy.__version__ != '0.0.0'"
          popd
          pip uninstall conda-smithy --yes

          python -m pip install -v --no-build-isolation .

      - name: test data and templates files in sdist
        run: |
          set -ex
          rm -rf dist/*
          python -m build --sdist --outdir dist/ .
          mkdir sdist-content/
          tar -xzf dist/*.tar.gz -C sdist-content/
          test -f sdist-content/conda_smithy-*/conda_smithy/data/conda-forge.yml
          test -f sdist-content/conda_smithy-*/conda_smithy/templates/github-actions.yml.tmpl
          rm -r sdist-content/

      # we remove the local package and set some env vars to emulate the smithy feedstock
      # CI env in the hopes that we catch errors here.
      - name: run tests
        run: |
          rm -rf conda_smithy
          export CONDA_BUILD=1
          export CONDA_BUILD_STATE=TEST
          export RATTLER_BUILD_COLOR=always
          export RATTLER_BUILD_ENABLE_GITHUB_INTEGRATION=true
          pytest tests --cov conda_smithy --cov-report lcov --cov-report term-missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: coveralls
        uses: coverallsapp/github-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ./coverage.lcov
